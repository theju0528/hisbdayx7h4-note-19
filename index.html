<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Precious ❤️</title>
<style>
body {
 margin: 0;
 font-family: 'Segoe UI', sans-serif;
 background: linear-gradient(to bottom right, #ffdde1, #ee9ca7);
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 overflow: hidden;
 color: #fff;
 text-align: center;
}
.card {
 background: rgba(0,0,0,0.3);
 padding: 25px;
 border-radius: 20px;
 width: 90%;
 max-width: 520px;
 backdrop-filter: blur(10px);
 z-index: 2;
}
img {
 width: 100%;
 max-width: 280px;
 height: auto;
 border-radius: 15px;
 margin-bottom: 15px;
}
.heart {
 position: absolute;
 bottom: -10px;
 font-size: 20px;
 animation: float 6s linear infinite;
}
@keyframes float {
 0% { transform: translateY(0); opacity: 1; }
 100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>
<body>
<div class="card">
<h2>Happy Birthday, My Precious ❤️</h2>
<!-- 📸 YOUR IMAGE -->
<img src="https://i.ibb.co/JWbskhkk/IMG-2113.jpg">
<p id="text"></p>
</div>
<!-- 🎶 MUSIC -->
<audio id="music" loop autoplay>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>
<script>
// 💌 MESSAGE
const message = `TO MY DARLING...
You came into my life so quietly,
but became the most beautiful part of it.
You are everything I hoped for,
everything I wished for…
and more.
I am so proud of you.
And I will keep choosing you,
always and celebrating you everyday.
HAPPY BIRTHDAY BUJJI! All success and happiness to you ❤️`;
let i = 0;
function typeWriter() {
 if (i < message.length) {
   document.getElementById("text").innerHTML += message.charAt(i);
   i++;
   setTimeout(typeWriter, 40);
 }
}
// 💖 HEARTS
function createHearts() {
 setInterval(() => {
   const heart = document.createElement("div");
   heart.classList.add("heart");
   heart.innerHTML = "❤️";
   heart.style.left = Math.random() * 100 + "vw";
   heart.style.fontSize = (Math.random() * 20 + 10) + "px";
   document.body.appendChild(heart);
   setTimeout(() => {
     heart.remove();
   }, 6000);
 }, 300);
}
// 🚀 START EVERYTHING
window.onload = function() {
 document.getElementById("music").play();
 typeWriter();
 createHearts();
};
</script>
</body>
</html>
